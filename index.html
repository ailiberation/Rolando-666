<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <link rel="stylesheet" href="style.css" />
  <title>Rolando 666</title>

  <script type="importmap">
  {
    "imports": {
      "tone": "https://esm.sh/tone@14.8.39"
    }
  }
  </script>
</head>
<body>
  <div id="app">
    <div id="top-row">
      <div id="transport">
        <button id="play" aria-label="Play">▶</button>
        <button id="stop" aria-label="Stop">■</button>
        <div id="bpm-control">
          <button id="bpm-down">−</button>
          <div id="bpm-display">120</div>
          <button id="bpm-up">+</button>
        </div>
      </div>

      <div id="reverb-controls">
        <label class="small">Reverb</label>
        <input id="reverb-wet" type="range" min="0" max="1" step="0.01" value="0.25" />
        <label class="small">Decay</label>
        <input id="reverb-decay" type="range" min="0.5" max="8" step="0.1" value="3.5" />
    </div>

    <div id="accent-control">
      <label class="small">Accent</label>
      <input id="accent" type="range" min="0.4" max="1" step="0.01" value="0.9" />
    </div>
